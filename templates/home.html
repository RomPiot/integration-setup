<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Home</title>
    <script src="../public/build/front.js"></script>
    <link rel="stylesheet" href="../public/build/front.css">
</head>

<body class="home-page">

<h1>{{ page.title }}</h1>
<p>{{ page.description }}</p>

<div class="container">
    <div class="row">
        {% for card in page.cards %}
            <div class="card col-md-4">
                {% set image_url = card.image.url ~ card.id %}
                <img src="{{ image_url }}" class="card-img-top"
                     alt="{{ card.image.alt }}" title="{{ card.image.title }}">
                <div class="card-body">
                    <h5 class="card-title">{{ card.title }}</h5>
                    <p class="card-text">{{ card.description }}</p>
                    <a href="#" class="btn btn-primary">GOOOO</a>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
